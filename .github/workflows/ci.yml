name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.55.0

      - name: Install checkov
        run: |
          uv tool install checkov==3.2.526
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install terraform-docs
        run: |
          curl -sSLo terraform-docs.tar.gz \
            https://github.com/terraform-docs/terraform-docs/releases/download/v0.19.0/terraform-docs-v0.19.0-linux-amd64.tar.gz
          tar -xzf terraform-docs.tar.gz terraform-docs
          sudo mv terraform-docs /usr/local/bin/

      - name: Build Lambda ZIPs
        # terraform_validate needs these to exist locally: main.tf hashes them
        # via filebase64sha256 for source_code_hash, and terraform/.build/ is
        # gitignored (built on demand by `task build`/`task apply`).
        run: |
          for pkg in orchestrator notifier; do
            rm -rf terraform/.build/$pkg
            pip3 install --quiet \
              --platform manylinux2014_x86_64 \
              --python-version 3.13 \
              --implementation cp \
              --only-binary=:all: \
              --target terraform/.build/$pkg ./src/$pkg
            (cd terraform/.build/$pkg && zip -qr ../$pkg.zip .)
          done

      - name: Run pre-commit
        run: uv tool run pre-commit run --all-files

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run pytest
        run: uv run pytest --tb=short -q
